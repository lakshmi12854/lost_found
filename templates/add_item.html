<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report an Item | Lost & Found</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-white border-b border-slate-200 py-4 px-6 mb-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="/items" class="text-indigo-600 font-bold text-lg flex items-center gap-1">⬅️ Back to Gallery</a>
            <a href="/logout" class="text-sm font-medium text-red-600 hover:underline">Logout</a>
        </div>
    </nav>

    <div class="max-w-xl mx-auto px-4 pb-12">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-900 mb-2">Report a New Item</h2>
            <p class="text-sm text-slate-500 mb-6">Provide accurate details to trigger our background similarity algorithm instantly.</p>

            <form action="/add_item" method="POST" enctype="multipart/form-data" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Item Title</label>
                    <input type="text" name="item_name" required placeholder="e.g., Black Leather Wallet" 
                        class="w-full px-4 py-3 border border-slate-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition text-slate-900 placeholder-slate-400">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Detailed Description</label>
                    <textarea name="description" rows="4" required placeholder="Describe item colors, features, missing location details..." 
                        class="w-full px-4 py-3 border border-slate-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition text-slate-900 placeholder-slate-400"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Contact Information</label>
                    <input type="text" name="contact" required placeholder="Phone number or Alternate email" 
                        class="w-full px-4 py-3 border border-slate-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition text-slate-900 placeholder-slate-400">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Upload Item Image</label>
                    <input type="file" name="image" accept="image/*" required 
                        class="w-full px-4 py-3 border border-slate-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition text-slate-600 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>

                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:shadow-lg transition duration-200 transform active:scale-[0.98]">
                    Post Item Report
                </button>
            </form>
        </div>
    </div>

</body>
</html>
